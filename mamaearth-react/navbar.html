<!DOCTYPE html>
<html>
    <head>
        <style>
          
.top-bar {
    background: #f44336;
    color: white;
    font-size: 14px;
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
}


.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: #2aa3df;
}

.logo span {
    color: #5dbb63;
}

.search-box {
    display: flex;
    width: 40%;
}

.search-box input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-right: none;
    outline: none;
}

.search-box button {
    padding: 10px 20px;
    background: #2aa3df;
    color: white;
    border: none;
    cursor: pointer;
}

.nav-right span {
    margin-left: 1px;
    cursor: pointer;
}
.nav-right {
    display: flex;
    align-items: center;
    gap: 35px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 15px;
    color: #333;
    transition: 0.3s;
}

.nav-item img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}

.nav-item:hover {
    color: #2aa3df;
    transform: translateY(-2px);
}


.menu-bar {/* categories design*/
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px 10px;
    font-size: 14px;
    background: #f9f9f9;
}

.menu-bar a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
}

.menu-bar a:hover {
    color: #2aa3df;
}


.hero img {
    width: 100%;
    height: 500px;
    object-fit: cover;
}

        </style>
    </head>
    <body>

    </div>

    <div class="nav-right">
    <div class="nav-item">
        <img src="shopping-cart.png" alt="Cart">

    </div>
    

    <div class="nav-item">
        <img src="login.png" alt="Login">
        <span>Login</span>
    </div>
    </div>
</div>
